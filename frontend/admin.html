<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS 管理台 // 新资料库编辑</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div id="admin-app">
    <header class="topbar">
      <div>
        <h1>IRIS 新资料库编辑台</h1>
        <span id="status">就绪</span>
      </div>
      <div class="token-row">
        <input id="admin-token" type="password" placeholder="ADMIN_TOKEN，本机开发可留空">
        <button id="save-token">保存令牌</button>
        <a href="/" class="link-btn">返回聊天</a>
      </div>
    </header>

    <main class="layout">
      <aside class="left-pane">
        <div class="tabs">
          <button class="tab active" data-tab="documents">文档</button>
          <button class="tab" data-tab="entities">实体</button>
        </div>

        <section id="document-search" class="search-panel">
          <input id="document-query" placeholder="搜索标题、正文、元数据">
          <div class="search-row">
            <input id="document-content-type" placeholder="content_type">
            <input id="document-entity" placeholder="实体名/别名">
          </div>
          <div class="search-row">
            <input id="document-source-tier" type="number" min="1" max="5" placeholder="source_tier">
            <select id="document-review-filter">
              <option value="">全部状态</option>
              <option value="pending">待处理</option>
              <option value="approved">已确认</option>
              <option value="needs_review">需复核</option>
              <option value="seeded">种子数据</option>
              <option value="rejected">已驳回</option>
            </select>
          </div>
          <button id="search-documents">搜索文档</button>
          <button id="new-document">新建文档</button>
          <div id="document-results" class="result-list"></div>
        </section>

        <section id="entity-search" class="search-panel hidden">
          <input id="entity-query" placeholder="搜索实体或别名">
          <div class="search-row">
            <input id="entity-type-filter" placeholder="entity_type">
            <select id="entity-review-filter">
              <option value="">全部状态</option>
              <option value="pending">待处理</option>
              <option value="approved">已确认</option>
              <option value="needs_review">需复核</option>
              <option value="seeded">种子数据</option>
              <option value="rejected">已驳回</option>
            </select>
          </div>
          <button id="search-entities">搜索实体</button>
          <button id="new-entity">新建实体</button>
          <div id="entity-results" class="result-list"></div>
        </section>
      </aside>

      <section class="center-pane">
        <div id="empty-state" class="empty-state">选择一个文档或实体开始编辑。</div>

        <div id="document-editor" class="editor hidden">
          <div class="editor-head">
            <div>
              <span id="document-id" class="pill"></span>
              <input id="document-title" class="title-input" placeholder="标题">
            </div>
            <button id="save-document">保存文档</button>
          </div>
          <div class="meta-grid">
            <input id="document-subtitle" placeholder="副标题">
            <input id="document-source-name" placeholder="来源名称">
            <input id="document-source-uri" placeholder="来源 URI">
            <input id="document-content-type-edit" placeholder="content_type">
            <input id="document-source-tier-edit" type="number" min="1" max="5" placeholder="source_tier">
            <select id="document-canon-status">
              <option value="official">official</option>
              <option value="semi_official">semi_official</option>
              <option value="non_canon">non_canon</option>
              <option value="unknown">unknown</option>
            </select>
            <select id="document-review-status">
              <option value="pending">pending</option>
              <option value="approved">approved</option>
              <option value="needs_review">needs_review</option>
              <option value="seeded">seeded</option>
              <option value="rejected">rejected</option>
            </select>
            <input id="document-perspective-scope" placeholder="perspective_scope">
          </div>
          <textarea id="document-metadata" spellcheck="false" placeholder="metadata JSON"></textarea>
          <div class="button-row">
            <button id="add-unit">新增文本单元</button>
            <button id="rebuild-mentions">重建实体提及</button>
            <button id="delete-document" class="danger">删除文档</button>
          </div>
          <h3>文本单元</h3>
          <div id="unit-list" class="chunk-list"></div>
        </div>

        <div id="entity-editor" class="editor hidden">
          <div class="editor-head">
            <div>
              <span id="entity-id" class="pill"></span>
              <input id="entity-name" class="title-input" placeholder="实体名">
            </div>
            <button id="save-entity">保存实体</button>
          </div>
          <div class="meta-grid">
            <input id="entity-type" placeholder="entity_type">
            <input id="entity-name-en" placeholder="英文名">
            <select id="entity-review-status">
              <option value="pending">pending</option>
              <option value="approved">approved</option>
              <option value="needs_review">needs_review</option>
              <option value="seeded">seeded</option>
              <option value="rejected">rejected</option>
            </select>
            <input id="alias-value" placeholder="新增别名">
          </div>
          <textarea id="entity-summary" placeholder="实体摘要"></textarea>
          <textarea id="entity-properties" spellcheck="false" placeholder="properties JSON"></textarea>
          <div class="button-row">
            <button id="add-alias">新增别名</button>
          </div>
        </div>
      </section>

      <aside class="right-pane">
        <section class="side-section">
          <h2>实体提及</h2>
          <div id="mention-list" class="result-list compact"></div>
        </section>

        <section class="side-section">
          <h2>别名</h2>
          <div id="alias-list" class="tag-list"></div>
        </section>

        <section class="side-section">
          <h2>版本历史</h2>
          <div id="revision-list" class="result-list compact"></div>
        </section>

        <section class="side-section">
          <h2>审计记录</h2>
          <div id="audit-list" class="result-list compact"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
